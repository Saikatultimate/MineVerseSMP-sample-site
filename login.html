<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineVerse BD - Login / Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --card-bg: rgba(10, 10, 10, 1.0);
      --green-primary: #00ff88;
      --green-secondary: #00cc6a;
      --green-glow-soft: rgba(0, 255, 136, 0.4);
      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --input-bg: rgba(20, 20, 20, 0.9);
      --glow-speed: 4s;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Video Background - 100% Visible */
    .video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .ambient-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.2;
      will-change: transform;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.3) 0%, transparent 70%);
    }

    .bg-glow-1 { width: 600px; height: 600px; top: -200px; left: -100px; animation: float-glow-1 20s ease-in-out infinite; }
    .bg-glow-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; animation: float-glow-2 25s ease-in-out infinite; }

    @keyframes float-glow-1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, 30px) scale(1.1); } }
    @keyframes float-glow-2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-40px, -20px) scale(1.05); } }

    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: var(--green-primary);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 6px var(--green-primary);
      animation: float-particle 8s infinite ease-in-out;
    }

    @keyframes float-particle {
      0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-100px) scale(1); }
    }

    .card-wrapper { position: relative; z-index: 10; }

    .glow-ambient {
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: transparent;
      box-shadow: 0 0 30px var(--green-primary), 0 0 60px rgba(0, 255, 136, 0.5), 0 0 100px rgba(0, 255, 136, 0.3);
      opacity: 0.6;
      z-index: -2;
    }

    .glow-effect {
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: conic-gradient(from var(--angle, 0deg), transparent 0%, var(--green-primary) 10%, var(--green-secondary) 20%, transparent 30%);
      filter: blur(12px);
      opacity: 1;
      z-index: -1;
      animation: rotate-glow var(--glow-speed) linear infinite;
    }

    @keyframes rotate-glow { from { --angle: 0deg; } to { --angle: 360deg; } }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

    .card {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      padding: 48px 40px;
      width: 400px;
      max-width: 90vw;
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.15), inset 0 0 60px rgba(0, 255, 136, 0.05);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, transparent 100%);
      pointer-events: none; z-index: -1;
    }

    .brand-title {
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 32px;
      letter-spacing: 2px;
      background: linear-gradient(to right, #ffffff, var(--green-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    .tab-container {
      display: flex;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 32px;
      position: relative;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: color 0.3s ease;
      position: relative;
      z-index: 2;
    }

    .tab-btn.active { color: var(--bg); }

    .tab-slider {
      position: absolute;
      top: 4px; left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--green-primary);
      border-radius: 10px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
      box-shadow: 0 0 15px var(--green-glow-soft);
    }

    .tab-slider.right { transform: translateX(100%); }

    .form-container { overflow: hidden; position: relative; }
    .forms-slider { display: flex; width: 200%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .forms-slider.slide-left { transform: translateX(-50%); }
    .form { width: 50%; flex-shrink: 0; padding-right: 20px; }
    .input-group { margin-bottom: 20px; }

    .input-label {
      display: block;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .input-field:focus {
      border-color: var(--green-primary);
      box-shadow: 0 0 0 3px var(--green-glow-soft);
      background: rgba(0, 0, 0, 0.6);
    }

    .submit-btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--green-primary), var(--green-secondary));
      border: none;
      border-radius: 10px;
      color: var(--bg);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--green-glow-soft); }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
    .divider-text { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .social-btn:hover { border-color: var(--green-primary); background: rgba(0, 255, 136, 0.05); }
    .forgot-link { display: block; text-align: right; color: var(--green-primary); font-size: 13px; text-decoration: none; margin-top: 12px; transition: opacity 0.2s ease; }
    .guest-link { display: block; text-align: center; color: var(--text-secondary); font-size: 13px; text-decoration: none; margin-top: 24px; transition: color 0.2s ease; }
    .guest-link:hover { color: var(--green-primary); }

    @media (prefers-reduced-motion: reduce) {
      .glow-effect, .particle, .bg-glow { animation: none; }
      .forms-slider, .tab-slider { transition: none; }
      .glow-effect { opacity: 0; }
    }
    @media (max-width: 480px) { .card { padding: 32px 24px; } .brand-title { font-size: 24px; } }
  </style>
</head>
<body>
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="overworld.mp4" type="video/mp4">
  </video>

  <div class="ambient-bg" id="ambientBg">
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>
  </div>

  <div class="card-wrapper">
    <div class="glow-ambient" aria-hidden="true"></div>
    <div class="glow-effect" aria-hidden="true"></div>
    
    <div class="card">
      <h1 class="brand-title">MINEVERSE</h1>
      
      <div class="tab-container" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="login" id="loginTab">Login</button>
        <button class="tab-btn" role="tab" data-tab="signup" id="signupTab">Sign Up</button>
        <div class="tab-slider" aria-hidden="true"></div>
      </div>

      <div class="form-container">
        <div class="forms-slider" id="formsSlider">
          
          <form class="form" id="loginForm" action="index.html">
            <div class="input-group">
              <label class="input-label" for="loginEmail">Email</label>
              <input type="email" id="loginEmail" class="input-field" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
              <label class="input-label" for="loginPassword">Password</label>
              <input type="password" id="loginPassword" class="input-field" placeholder="Enter your password" required>
            </div>
            <a href="#" class="forgot-link">Forgot password?</a>
            <button type="submit" class="submit-btn">Login</button>
            
            <div class="divider">
              <div class="divider-line"></div>
              <span class="divider-text">or</span>
              <div class="divider-line"></div>
            </div>

            <button type="button" class="social-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continue with Google
            </button>
            
            <a href="index.html" class="guest-link">Continue as Guest</a>
          </form>

          <form class="form" id="signupForm" action="index.html">
            <div class="input-group">
              <label class="input-label" for="signupName">Full Name</label>
              <input type="text" id="signupName" class="input-field" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
              <label class="input-label" for="signupEmail">Email</label>
              <input type="email" id="signupEmail" class="input-field" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
              <label class="input-label" for="signupPassword">Password</label>
              <input type="password" id="signupPassword" class="input-field" placeholder="Create a password" required>
            </div>
            <button type="submit" class="submit-btn">Create Account</button>
            
            <div class="divider">
              <div class="divider-line"></div>
              <span class="divider-text">or</span>
              <div class="divider-line"></div>
            </div>

            <button type="button" class="social-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continue with Google
            </button>
          </form>
        
        </div>
      </div>
    </div>
  </div>

  <script>
    const ambientBg = document.getElementById('ambientBg');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (6 + Math.random() * 4) + 's';
      ambientBg.appendChild(particle);
    }

    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabSlider = document.querySelector('.tab-slider');
    const formsSlider = document.getElementById('formsSlider');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (tab === 'signup') {
          tabSlider.classList.add('right');
          formsSlider.classList.add('slide-left');
        } else {
          tabSlider.classList.remove('right');
          formsSlider.classList.remove('slide-left');
        }
      });
    });
  </script>
</body>
</html>
